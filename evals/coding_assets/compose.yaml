# Docker sandbox for the S2 coding suite. One service; Inspect execs the episode's bash
# calls and the scorer's hidden-test run inside it. Rebuilt from ./Dockerfile.
#
# Untrusted code runs here (fable-planning/04 security posture): no network, capped
# resources, fresh container per sample (Inspect tears it down after each).
services:
  default:
    build: .
    command: ["sleep", "infinity"]
    working_dir: /workspace
    network_mode: none      # tasks are stdlib-only; a pip-install probe must fail
    mem_limit: 2g
    cpus: 2.0
    pids_limit: 256
    # writable /workspace comes from the image (chowned to runner); no bind mounts
