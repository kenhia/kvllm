# Fixture-homelab sandbox for the S3 agentic suite. Same hardening as the coding sandbox:
# untrusted model-driven bash, no network, capped resources, fresh container per sample.
services:
  default:
    build: .
    command: ["sleep", "infinity"]
    working_dir: /workspace
    network_mode: none
    mem_limit: 1g
    cpus: 1.0
    pids_limit: 256
