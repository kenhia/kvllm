# Eval harness scoring configuration (planning/03). Re-weighting here re-ranks the
# leaderboard on the next `just eval`/`just eval-all` run — no model re-runs needed
# (`uv run python -m kvllm.evalrun --rescore` rebuilds cards+board from existing results).

# Composite = speed_factor × Σ(weight_i × suite_score_i) / Σ(weight_i), over the suites a model
# is ELIGIBLE for (has current-version scores). Weights renormalize over eligible suites, so a
# model without a vision suite isn't penalized for it. A suite with weight 0 is shown, not ranked.
[weights]
tools = 0.30
code = 0.35
agentic = 0.25 # suite lands in Phase 4
judged = 0.10
# Bumped 2026-07-03 (sprint 11): 7 vision models scored on S5 v1 — the roadmap's ≥3 rule.
# Weights renormalize over eligible suites, so text-only models are unaffected.
vision = 0.15
# assisted: agentic under controller scaffolding (bigger budget + wrap-up demand). Weight 0
# BY DESIGN: it's a labeled alternate condition — shown on the board, never ranked, so the
# raw-autonomy comparison stays honest. The assisted-vs-agentic delta is the measurement
# (model-research/agentic-gap-2026-07.md). Opt-in: `just eval <key> --suite assisted`.
assisted = 0.0

# Speed multiplier on the composite, from the gate's decode tok/s:
# ≤ floor → 0.5 (and the verdict is capped at "has issues"); ≥ full → 1.0; linear between.
[speed]
floor_tok_s = 10
full_tok_s = 40

# Verdict derivation (replaces the v1 all-suites-≥0.8 rule, which flagged every model
# "has issues" once genuinely hard suites landed):
#   skip       = failed the operational gate
#   has issues = composite < composite_floor, or decode at/below the speed floor,
#                or any weighted suite < suite_floor
#   worth trying = otherwise
[verdict]
composite_floor = 0.55
suite_floor = 0.40

# Where suite sandboxes run (planning/04). Inspect drives `docker compose` here for the
# coding/agentic suites; empty = kai's local Docker. An explicit DOCKER_HOST env var overrides.
# ssh:// needs the ControlMaster block in ~/.ssh/config (Host ksandbox) — without multiplexing,
# concurrent compose calls storm sshd MaxStartups and episodes die with "No services started".
[sandbox]
docker_host = "ssh://ken@ksandbox"

[judge]
model = "anthropic/claude-haiku-4-5-20251001"
# Calibrated 2026-07-02: 12/12 of Ken's hand scores within ±1 of the judge (mean |Δ| 0.42) —
# see model-research/evals/calibration/judged-sheet.md. Re-run the protocol if the judge
# model changes.
calibrated = true

# API pricing per MTok (from the claude-api skill, 2026-07-02) for baseline cost estimates:
# est $ = in×input + out×output + cache_read×0.1×input + cache_write×1.25×input, per MTok.
# Sonnet 5 uses the intro price (reverts to 3.00/15.00 after 2026-08-31).
[pricing."anthropic/claude-haiku-4-5"]
input = 1.00
output = 5.00

[pricing."anthropic/claude-sonnet-5"]
input = 2.00
output = 10.00

[pricing."anthropic/claude-opus-4-8"]
input = 5.00
output = 25.00

[pricing."anthropic/claude-haiku-4-5-20251001"] # judge model id (same pricing as haiku alias)
input = 1.00
output = 5.00
