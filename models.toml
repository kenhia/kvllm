# kvllm model registry
#
# Each [models.<key>] describes one model vLLM can serve on the kai RTX 5090 (32 GB, sm_120).
# The <key> is what the OpenAI client passes as `model=` — kvllm serves it via
# `--served-model-name <key>` (see docs/01-backend-contract.md). vLLM loads HuggingFace weights
# directly, so this registry is just metadata + serve flags — no per-model engine build.
#
# Fields:
#   hf_repo           (required) HuggingFace repo id.
#   tool_parser       vLLM --tool-call-parser; presence ⇒ serve with --enable-auto-tool-choice.
#   reasoning_parser  vLLM --reasoning-parser (separates <think> for reasoning models).
#   max_model_len     context window to serve (KV-cache sized to this; trim to fit VRAM).
#   quantization      vLLM --quantization (e.g. "awq", "gptq"); omit for bf16/fp16 weights.
#   gated             true ⇒ needs a HuggingFace token / license acceptance.
#   est_vram_gb       rough weights+KV footprint at the listed max_model_len (sanity, not exact).
#   capabilities      free-form tags: chat / tools / code / reasoning / vision.
#   tested            true ⇒ actually served + smoke-tested on kai.
#   notes             one-liner.

[models."qwen2.5-7b-instruct"]
hf_repo = "Qwen/Qwen2.5-7B-Instruct"
tool_parser = "hermes"
max_model_len = 8192
gated = false
est_vram_gb = 17
capabilities = ["chat", "tools"]
tested = true
notes = "Default. Gold-standard tool calling; reliable bind_tools (Sprint 1)."

[models."qwen2.5-coder-7b-instruct"]
hf_repo = "Qwen/Qwen2.5-Coder-7B-Instruct"
tool_parser = "hermes"
max_model_len = 8192
gated = false
est_vram_gb = 17
capabilities = ["chat", "code", "tools"]
tested = false
notes = "Coding-tuned Qwen2.5; same hermes tool parser. (Also in the TRT registry.)"

[models."deepseek-r1-distill-qwen-7b"]
hf_repo = "deepseek-ai/DeepSeek-R1-Distill-Qwen-7B"
reasoning_parser = "deepseek_r1"
tool_parser = "hermes"
max_model_len = 8192
gated = false
est_vram_gb = 17
capabilities = ["chat", "reasoning"]
tested = true
notes = "R1 distill; strong reasoning, weak tool use (burns token budget thinking)."

[models."llama-3.1-8b-instruct"]
hf_repo = "meta-llama/Llama-3.1-8B-Instruct"
tool_parser = "llama3_json"
max_model_len = 8192
gated = true
est_vram_gb = 18
capabilities = ["chat", "tools"]
tested = false
notes = "Gated (accept Meta license + HF token). Uses the llama3_json tool parser, not hermes."

[models."qwen2.5-14b-instruct-awq"]
hf_repo = "Qwen/Qwen2.5-14B-Instruct-AWQ"
tool_parser = "hermes"
quantization = "awq"
max_model_len = 8192
gated = false
est_vram_gb = 12
capabilities = ["chat", "tools"]
tested = false
notes = "AWQ 4-bit 14B — bigger model that comfortably fits 32 GB. See docs/02-quantization.md."
