# kvllm model registry
#
# Each [models.<key>] describes one model vLLM can serve on the kai RTX 5090 (32 GB, sm_120).
# The <key> is what the OpenAI client passes as `model=` — kvllm serves it via
# `--served-model-name <key>` (see docs/01-backend-contract.md). vLLM loads HuggingFace weights
# directly, so this registry is just metadata + serve flags — no per-model engine build.
#
# Fields:
#   hf_repo           (required) HuggingFace repo id.
#   tool_parser       vLLM --tool-call-parser; presence ⇒ serve with --enable-auto-tool-choice.
#   reasoning_parser  vLLM --reasoning-parser (separates <think> for reasoning models).
#   max_model_len     context window to serve (KV-cache sized to this; trim to fit VRAM).
#   quantization      vLLM --quantization (e.g. "awq", "gptq"); omit for bf16/fp16 weights.
#   trust_remote_code true ⇒ pass --trust-remote-code (needed by some models, e.g. InternVL).
#   enforce_eager     true ⇒ pass --enforce-eager (skip CUDA-graph capture: saves VRAM, slower).
#   gated             true ⇒ needs a HuggingFace token / license acceptance.
#   est_vram_gb       rough weights+KV footprint at the listed max_model_len (sanity, not exact).
#   capabilities      free-form tags: chat / tools / code / reasoning / vision.
#   tested            true ⇒ actually served on kai (set by `just eval`).
#   notes             one-liner.
#   eval_verdict/eval_date/eval_notes  written by `just eval` (worth trying / has issues / skip).
#                     `models-list` hides eval_verdict="skip" (won't fit/run here) unless --all.

[models."qwen2.5-7b-instruct"]
hf_repo = "Qwen/Qwen2.5-7B-Instruct"
tool_parser = "hermes"
max_model_len = 8192
gated = false
est_vram_gb = 17
capabilities = ["chat", "code", "tools"]
tested = true
notes = "Default. Gold-standard tool calling; reliable bind_tools (Sprint 1). General coder (code cap added Sprint 8 as the coding-suite contrast to the coding-tuned qwen2.5-coder)."
eval_verdict = "has issues"
eval_date = "2026-07-03"

